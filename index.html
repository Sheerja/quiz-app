<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <title>quiz</title>
</head>
<body>
    <div class="container">
    <div class="top">
        <div class="logo"> 
        <img src="book_img.jfif">
        <h2>Take this Quiz..</h2>
        </div>
        <div class="timer">
            <i class="material-icons" style="font-size:48px;color:red">alarm</i>
            <span id="time">10</span>s
        </div>
    </div>
    <div class="progress">
        <h3>Question <span id="current">1</span> out of 5</h3>
        <div class="progress-dots">
        <span class="dot active"></span>
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
       
        </div>
    </div>
    <div class="ques">
        <h2 id="question"></h2>
        <div class="options">
        <button class="option"></button>
        <button class="option"></button>
        <button class="option"></button>
        <button class="option"></button>
        </div>
    </div>
    <div class="buttons">
        <button id="nextbtn"><i class="fa fa-arrow-right" style="font-size:18px"></i>  Next</button>
    </div>
    </div>
   <script src="script.js"></script> 
</body>
</html>
